server:
  port: 9440

spring:
  application:
    name: pipeline-data
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${PIPELINE_DB_HOST:127.0.0.1}:${PIPELINE_DB_PORT:3307}/pipeline_cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: ${PIPELINE_DB_USERNAME:root}
    password: ${PIPELINE_DB_PASSWORD:root}
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.pipeline.data: DEBUG

knowledge:
  document:
    agent-base-url: http://localhost:8100
    upload-path: /api/v1/knowledge/upload
    delete-path: /api/v1/knowledge/document/{docId}
    internal-token:
    internal-key:
    connect-timeout-ms: 5000
    read-timeout-ms: 120000
    legacy-base-path:
    allowed-categories:
      - standards
      - formulas
      - operations
      - cases
      - faq
    minio:
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: knowledge-base
