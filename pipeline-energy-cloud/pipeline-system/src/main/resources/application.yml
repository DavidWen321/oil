server:
  port: 9201

spring:
  application:
    name: pipeline-system
  cloud:
    nacos:
      discovery:
        server-addr: ${PIPELINE_NACOS_SERVER_ADDR:localhost:8848}
        username: ${PIPELINE_NACOS_USERNAME:}
        password: ${PIPELINE_NACOS_PASSWORD:}
      config:
        server-addr: ${PIPELINE_NACOS_SERVER_ADDR:localhost:8848}
        username: ${PIPELINE_NACOS_USERNAME:}
        password: ${PIPELINE_NACOS_PASSWORD:}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${PIPELINE_DB_HOST:127.0.0.1}:${PIPELINE_DB_PORT:3306}/pipeline_cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: ${PIPELINE_DB_USERNAME:root}
    password: ${PIPELINE_DB_PASSWORD:root}
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 10s
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.pipeline.system: DEBUG
