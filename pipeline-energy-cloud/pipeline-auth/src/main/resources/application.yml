server:
  port: 9300

spring:
  application:
    name: pipeline-auth
  cloud:
    nacos:
      discovery:
        server-addr: ${PIPELINE_NACOS_SERVER_ADDR:localhost:8848}
        username: ${PIPELINE_NACOS_USERNAME:}
        password: ${PIPELINE_NACOS_PASSWORD:}
      config:
        server-addr: ${PIPELINE_NACOS_SERVER_ADDR:localhost:8848}
        username: ${PIPELINE_NACOS_USERNAME:}
        password: ${PIPELINE_NACOS_PASSWORD:}
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${PIPELINE_DB_HOST:127.0.0.1}:${PIPELINE_DB_PORT:3306}/pipeline_cloud?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: ${PIPELINE_DB_USERNAME:root}
    password: ${PIPELINE_DB_PASSWORD:root}

sa-token:
  token-name: satoken
  timeout: 2592000
  activity-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.pipeline.auth: debug
